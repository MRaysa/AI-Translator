version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
    # Skip breaking major-version bumps (e.g. zod 3 -> 4); review those manually.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # One grouped PR instead of many, to avoid lockfile conflicts.
    groups:
      npm-dependencies:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
