<div class="bot-launcher">
  <div id="botHint" class="bot-hint" hidden>
    <span>Hi! 👋 I'm <b>Lingo</b> — need a translation or help?</span>
    <button id="botHintClose" class="bot-hint-x" aria-label="Dismiss">×</button>
  </div>
  <button id="botToggle" class="bot-toggle" aria-label="Open AI assistant" title="Ask Lingo">
    <span class="bot-pulse" aria-hidden="true"></span>
    <span class="bot-ping" aria-hidden="true"></span>
    <svg
      class="bot-ic bot-ic-open"
      viewBox="0 0 24 24"
      width="27"
      height="27"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M12 8V4H8"></path>
      <rect x="4" y="8" width="16" height="12" rx="2"></rect>
      <path d="M2 14h2M20 14h2M15 13v2M9 13v2"></path>
    </svg>
    <svg
      class="bot-ic bot-ic-close"
      viewBox="0 0 24 24"
      width="24"
      height="24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M18 6L6 18M6 6l12 12"></path>
    </svg>
  </button>
</div>

<div id="botPanel" class="bot-panel" hidden role="dialog" aria-label="Lingo AI assistant">
  <div class="bot-head">
    <div class="bot-id">
      <span class="bot-avatar">
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 8V4H8"></path>
          <rect x="4" y="8" width="16" height="12" rx="2"></rect>
          <path d="M2 14h2M20 14h2M15 13v2M9 13v2"></path>
        </svg>
      </span>
      <div>
        <strong>Lingo</strong>
        <span class="bot-status"><i></i> AI Assistant</span>
      </div>
    </div>
    <button id="botClose" class="bot-close" aria-label="Close">
      <svg
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M18 6L6 18M6 6l12 12"></path>
      </svg>
    </button>
  </div>
  <div id="botMessages" class="bot-messages"></div>
  <div id="botQuick" class="bot-quick">
    <button
      type="button"
      class="chip-btn"
      data-q="Translate 'Good morning, have a great day!' to Spanish."
    >
      Translate a phrase
    </button>
    <button type="button" class="chip-btn" data-q="How do I say 'thank you' in Japanese?">
      Say “thank you” in Japanese
    </button>
    <button type="button" class="chip-btn" data-q="What can this app do?">
      What can this app do?
    </button>
  </div>
  <form id="botForm" class="bot-form">
    <input id="botInput" type="text" placeholder="Ask Lingo anything…" autocomplete="off" />
    <button type="submit" id="botSend" class="chat-send" aria-label="Send">
      <svg
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M22 2L11 13"></path>
        <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
      </svg>
    </button>
  </form>
</div>
