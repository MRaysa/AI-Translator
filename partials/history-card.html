<details id="historyCard" class="advanced" hidden>
  <summary>
    <span class="adv-ic" aria-hidden="true">
      <svg
        viewBox="0 0 24 24"
        width="16"
        height="16"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M12 7v5l3 2"></path>
      </svg>
    </span>
    <span>Recent Translations</span>
    <span id="historyCount" class="hist-count"></span>
    <span class="adv-caret" aria-hidden="true">
      <svg
        viewBox="0 0 24 24"
        width="16"
        height="16"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M6 9l6 6 6-6"></path>
      </svg>
    </span>
  </summary>
  <div class="advanced-body">
    <div class="history-toolbar">
      <button id="clearHistory" class="mini-btn ghost" title="Clear history">
        <span>Clear all</span>
      </button>
    </div>
    <ul id="historyList" class="history-list"></ul>
  </div>
</details>
