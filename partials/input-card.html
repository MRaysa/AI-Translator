<section class="card">
  <div class="card-head">
    <span class="card-title">
      <svg
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
      Input
    </span>
    <div class="head-actions">
      <span class="counter"><span id="count">0</span> / 5000</span>
      <button id="mic" class="mini-btn ghost" hidden title="Voice input (speak to type)">
        <svg
          viewBox="0 0 24 24"
          width="14"
          height="14"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
          <line x1="12" y1="18" x2="12" y2="22"></line>
          <line x1="8" y1="22" x2="16" y2="22"></line>
        </svg>
        <span>Speak</span>
      </button>
      <button id="clear" class="mini-btn ghost" hidden title="Clear text">
        <svg
          viewBox="0 0 24 24"
          width="14"
          height="14"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 6h18"></path>
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <path d="M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"></path>
        </svg>
        <span>Clear</span>
      </button>
    </div>
  </div>

  <textarea id="input" placeholder="Enter text to translate…" maxlength="5000"></textarea>

  <div class="stats" id="stats" hidden>
    <span><b id="statWords">0</b> words</span>
    <span class="sep">·</span>
    <span><b id="statChars">0</b> characters</span>
    <span class="sep">·</span>
    <span>~<b id="statRead">0s</b> read</span>
  </div>

  <div class="controls">
    <div class="lang-cell">
      <label class="lbl">From</label>
      <div id="sourceLang" class="ss"></div>
    </div>
    <button id="swap" class="swap" title="Swap languages" aria-label="Swap languages">
      <svg
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M17 1l4 4-4 4"></path>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
        <path d="M7 23l-4-4 4-4"></path>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
      </svg>
    </button>
    <div class="lang-cell">
      <label class="lbl">To</label>
      <div id="targetLang" class="ss"></div>
    </div>
    <button id="translate" class="cta">
      <span class="cta-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M12 2l1.6 4.8L18 8l-4.4 1.2L12 14l-1.6-4.8L6 8l4.4-1.2L12 2z"></path>
        </svg>
      </span>
      <span class="spinner" hidden></span>
      <span class="cta-label">Translate</span>
    </button>
  </div>

  <details class="advanced">
    <summary>
      <span class="adv-ic" aria-hidden="true">
        <svg
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          ></path>
        </svg>
      </span>
      <span>Advanced Options</span>
      <span class="adv-caret" aria-hidden="true">
        <svg
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </span>
    </summary>
    <div class="advanced-body">
      <div class="adv-grid">
        <div class="adv-field">
          <label class="adv-flabel">Translation Style</label>
          <div id="modeBar" class="mode-select" aria-label="Translation style"></div>
        </div>
        <div class="adv-field">
          <label class="adv-flabel">Context</label>
          <div id="context" class="ctx-select" aria-label="Translation context"></div>
        </div>
        <div class="adv-field">
          <label class="adv-flabel">Preserve Formatting</label>
          <label class="toggle" title="Keep markdown, lists and line breaks">
            <input type="checkbox" id="preserve" checked />
            <span class="track"><span class="knob"></span></span>
            <span class="toggle-hint">Keep bold, italics, lists</span>
          </label>
        </div>
      </div>
    </div>
  </details>
</section>
