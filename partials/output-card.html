<section class="card">
  <div class="card-head">
    <span class="card-title">
      <svg
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M5 8l6 6"></path>
        <path d="M4 14l6-6 2-3"></path>
        <path d="M2 5h12"></path>
        <path d="M7 2h1"></path>
        <path d="M22 22l-5-10-5 10"></path>
        <path d="M14 18h6"></path>
      </svg>
      Translation
    </span>
    <div class="out-actions">
      <button id="listen" class="mini-btn" hidden title="Listen">
        <svg
          viewBox="0 0 24 24"
          width="15"
          height="15"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
          <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
          <path d="M19 5a9 9 0 0 1 0 14"></path>
        </svg>
        <span>Listen</span>
      </button>
      <button id="copy" class="mini-btn" hidden title="Copy">
        <svg
          viewBox="0 0 24 24"
          width="15"
          height="15"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="9" y="9" width="13" height="13" rx="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        <span>Copy</span>
      </button>
    </div>
  </div>

  <div id="output" class="output" data-empty="true">Your translation will appear here…</div>

  <details id="toolsBox" class="advanced">
    <summary>
      <span class="adv-ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16l-1.9-5.1L4.5 9l5.6-1.4L12 2z"></path>
        </svg>
      </span>
      <span>AI Tools</span>
      <span class="adv-caret" aria-hidden="true">
        <svg
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </span>
    </summary>
    <div class="advanced-body">
      <div id="toolbar" class="toolbar">
        <div class="tool-group">
          <span class="tool-group-label">
            <svg
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path>
            </svg>
            Rewrite
          </span>
          <div class="tool-chips" id="chipsRewrite"></div>
        </div>
        <div class="tool-group">
          <span class="tool-group-label">
            <svg
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </svg>
            Analyze
          </span>
          <div class="tool-chips" id="chipsAnalyze"></div>
        </div>
      </div>
    </div>
  </details>

  <div id="toolPanel" class="insight" hidden>
    <div class="insight-head">
      <span id="toolTitle">Result</span>
      <span id="simBadge" class="sim-badge" hidden></span>
      <button id="toolCopy" class="tool-copy" hidden title="Copy result">
        <svg
          viewBox="0 0 24 24"
          width="13"
          height="13"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="9" y="9" width="13" height="13" rx="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        Copy
      </button>
    </div>
    <div id="toolText" class="rich"></div>
  </div>

  <div class="card-foot">
    <span id="detected" class="chip" hidden><i class="dot"></i><span></span></span>
    <span class="powered">Powered by <b>OpenAI</b></span>
  </div>
  <p id="status" class="status" role="status" aria-live="polite"></p>
</section>
