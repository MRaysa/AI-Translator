<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Page not found · AI Translator</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          "Plus Jakarta Sans",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        color: #eef1fb;
        background: radial-gradient(1200px 700px at 50% -10%, #161a34, #070a14);
        text-align: center;
        padding: 2rem;
      }
      .wrap {
        max-width: 460px;
      }
      .code {
        font-size: clamp(5rem, 18vw, 9rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(120deg, #38bdf8, #7c5cff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0.5rem 0 0.4rem;
      }
      p {
        color: #8b93b4;
        margin: 0 0 1.75rem;
        line-height: 1.6;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.8rem 1.4rem;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(120deg, #38bdf8, #7c5cff);
        box-shadow: 0 14px 30px -10px rgba(124, 92, 255, 0.5);
        transition: transform 0.15s ease;
      }
      .btn:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>
        The page you’re looking for doesn’t exist or has moved. Let’s get you back to translating.
      </p>
      <a class="btn" href="/">← Back to AI Translator</a>
    </div>
  </body>
</html>
